name: Build Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: relay-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: relay-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: relay-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: relay-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact_name: relay-windows-amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          artifact_dir="dist/${{ matrix.artifact_name }}"
          binary_name="relay"
          if [ "$GOOS" = "windows" ]; then
            binary_name="relay.exe"
          fi

          mkdir -p "$artifact_dir"
          go build -trimpath -ldflags="-s -w" -o "$artifact_dir/$binary_name" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
