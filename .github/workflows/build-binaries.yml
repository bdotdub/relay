name: Build Binaries

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Install analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: relay-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: relay-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: relay-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: relay-darwin-arm64
          - goos: windows
            goarch: amd64
            artifact_name: relay-windows-amd64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          artifact_dir="dist/${{ matrix.artifact_name }}"
          binary_name="relay"
          if [ "$GOOS" = "windows" ]; then
            binary_name="relay.exe"
          fi

          mkdir -p "$artifact_dir"
          go build -trimpath -ldflags="-s -w" -o "$artifact_dir/$binary_name" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          if-no-files-found: error
